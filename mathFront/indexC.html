      re = 0;
      im = parseFloat(m[2]);
    } else if (m[1]) {
      re = parseFloat(m[1]);
      im = 0;
    }
  } else {
    // fallback: just replace j→i
    return s.replace('j', 'i');
  }
  const rFmt = v => Math.abs(v) < 1e-9 ? 0 : parseFloat(v.toFixed(6));
  re = rFmt(re); im = rFmt(im);
  if (re === 0 && im === 0) return '0';
  if (im === 0) return String(re);
  if (re === 0) return `${im}i`;
  return `${re}${im >= 0 ? '+' : ''}${im}i`;
}

function fmt(v){
  if (isComplexStr(v)) return fmtComplex(v);         // complex from backend → show as a+bi
  if (typeof v === 'string' && v.includes('/')) return v; // fraction → show as-is
  const n = evalFrac(v);
  if(isNaN(n)) return String(v);
  if(Math.abs(n)<1e-10) return '0';
  return parseFloat(n.toFixed(4)).toString();
}

function setLoading(on){
  document.getElementById('spinner').style.display=on?'block':'none';
  document.getElementById('calc-lbl').textContent=on?'Calculating...':'Calculate';
  document.getElementById('calc-btn').disabled=on;
}

function resetResult(){
  document.getElementById('result-area').innerHTML=`<div class="result-empty">
    <div class="result-empty-icon">⬡</div>
    <div class="result-empty-txt">awaiting calculation</div>
  </div>`;
}

function setStatus(ok){
  document.getElementById('status-dot').style.background=ok?'#2ecc71':'#e74c3c';
  document.getElementById('status-txt').textContent=ok?'connected':'offline';
}

const hist=[];
function addHistory(op,data){
  const preview=data.result&&Array.isArray(data.result)
    ?`[[${(data.result[0]||[]).map(v=>fmt(v)).join(', ')}]…]`
    :data.message||(typeof data.result==='string'?data.result:'')||'—';
  hist.unshift({op:op.replace(/-/g,' '),preview});
  if(hist.length>8) hist.pop();
  document.getElementById('history-list').innerHTML=hist.map(h=>
    `<div class="history-row"><span class="h-op">${h.op}</span><span class="h-txt">${h.preview}</span></div>`
  ).join('');
}

/* ── Jordan form: chain reaction flow visualization ── */
function drawJordanViz(ctx, W, H, data) {
  if (!data.J) return;
  const nRows = data.J.length;
  const cx = W / 2, cy = H / 2;
  let t = 0;

  // parse Jordan blocks — find eigenvalues and block sizes from diagonal
  const blocks = [];
  let i = 0;
  while (i < nRows) {
    const lam = evalFrac(data.J[i][i]) || 0;
    let size = 1;
    // check if next row has a 1 in superdiagonal (jordan block continuation)
    while (i + size < nRows && Math.abs(evalFrac(data.J[i + size - 1][i + size]) || 0) > 0.5) size++;
    blocks.push({ lam, size, start: i });
    i += size;
  }

  const colors = ['#4a9ebb', '#7ec8e3', '#2ecc71', '#e74c3c', '#b0dff0'];
  const boxW = Math.min(80, (W - 80) / Math.max(nRows, 1));
  const boxH = 44;
  const totalW = nRows * boxW + (nRows - 1) * 8;
  const startX = cx - totalW / 2;

  function frame() {
    t += 0.018;
    ctx.clearRect(0, 0, W, H);

    // faint background grid
    ctx.strokeStyle = 'rgba(74,158,187,0.05)';
    ctx.lineWidth = 1;
    for (let g = 0; g < W; g += 40) { ctx.beginPath(); ctx.moveTo(g, 0); ctx.lineTo(g, H); ctx.stroke(); }
    for (let g = 0; g < H; g += 40) { ctx.beginPath(); ctx.moveTo(0, g); ctx.lineTo(W, g); ctx.stroke(); }

    let col = 0;
    blocks.forEach((blk, bi) => {
      const color = colors[bi % colors.length];

      for (let s = 0; s < blk.size; s++) {
        const bx = startX + (col + s) * (boxW + 8);
        const by = cy - boxH / 2;

        // pulse effect for each box in the block — staggered by s
        const pulse = (Math.sin(t * 2 - s * 0.8) + 1) / 2;

        // box background
        ctx.save();
        ctx.shadowColor = color;
        ctx.shadowBlur = 8 + pulse * 12;
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.5;
        ctx.fillStyle = `rgba(${color === '#4a9ebb' ? '74,158,187' : color === '#7ec8e3' ? '126,200,227' : color === '#2ecc71' ? '46,204,113' : '231,76,60'},${0.08 + pulse * 0.1})`;
        ctx.beginPath();
        ctx.roundRect(bx, by, boxW - 4, boxH, 4);
        ctx.fill();
        ctx.stroke();
        ctx.restore();

        // eigenvalue label
        ctx.font = 'bold 13px "JetBrains Mono"';
        ctx.fillStyle = color;
        ctx.textAlign = 'center';
        ctx.fillText(`λ=${fmt(blk.lam)}`, bx + (boxW - 4) / 2, by + 18);

        // dimension index
        ctx.font = '10px "JetBrains Mono"';
        ctx.fillStyle = 'rgba(74,158,187,0.5)';
        ctx.fillText(`e${col + s + 1}`, bx + (boxW - 4) / 2, by + 34);

        // arrow between boxes in same block (the "feeds into" chain)
        if (s < blk.size - 1) {
          const arrowPulse = (Math.sin(t * 2 - s * 0.8 + 1) + 1) / 2;
          const ax = bx + boxW - 4;
          const ay = cy;
          ctx.save();
          ctx.globalAlpha = 0.4 + arrowPulse * 0.5;
          ctx.strokeStyle = color;
          ctx.fillStyle = color;
          ctx.lineWidth = 2;
          ctx.shadowColor = color;
          ctx.shadowBlur = 6;
          // line
          ctx.beginPath();
          ctx.moveTo(ax + 2, ay);
          ctx.lineTo(ax + 6, ay);
          ctx.stroke();
          // arrowhead
          ctx.beginPath();
          ctx.moveTo(ax + 10, ay);
          ctx.lineTo(ax + 6, ay - 4);
          ctx.lineTo(ax + 6, ay + 4);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }
      }

      // block label below
      const blockCenterX = startX + (col + blk.size / 2 - 0.5) * (boxW + 8) + (boxW - 4) / 2;
      ctx.font = '10px "JetBrains Mono"';
      ctx.fillStyle = `${color}99`;
      ctx.textAlign = 'center';
      ctx.fillText(`block ${bi + 1}  (${blk.size}×${blk.size})`, blockCenterX, cy + boxH / 2 + 20);

      col += blk.size;
    });

    // top label
    ctx.font = '500 11px "JetBrains Mono"';
    ctx.fillStyle = 'rgba(74,158,187,0.6)';
    ctx.textAlign = 'left';
    ctx.fillText(`${blocks.length} jordan block${blocks.length !== 1 ? 's' : ''}  —  arrows show chained directions`, 14, H - 16);

    animId = requestAnimationFrame(frame);
  }
  frame();
}
